<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뽀식이 소개</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: linear-gradient(135deg, #fff3d6, #ffe1e8);
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .card {
      width: 100%;
      max-width: 900px;
      background: #ffffff;
      border-radius: 30px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1.2fr;
    }

    .image-box {
      background: #ffd36e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      text-align: center;
    }

    .dog-face {
      width: 190px;
      height: 190px;
      background: #c9853f;
      border-radius: 50%;
      position: relative;
      box-shadow: inset 0 -10px 0 rgba(0, 0, 0, 0.08);
    }

    .ear {
      width: 70px;
      height: 100px;
      background: #a86632;
      border-radius: 50px;
      position: absolute;
      top: 35px;
    }

    .ear.left { left: -35px; }
    .ear.right { right: -35px; }

    .eye {
      width: 24px;
      height: 24px;
      background: #111;
      border-radius: 50%;
      position: absolute;
      top: 75px;
    }

    .eye.left { left: 55px; }
    .eye.right { right: 55px; }

    .nose {
      width: 28px;
      height: 20px;
      background: #222;
      border-radius: 50%;
      position: absolute;
      top: 110px;
      left: 50%;
      transform: translateX(-50%);
    }

    .mouth {
      position: absolute;
      top: 135px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
    }

    .image-box h2 {
      margin-top: 25px;
      font-size: 28px;
      color: #5b3517;
    }

    .content {
      padding: 45px;
    }

    .content h1 {
      font-size: 42px;
      margin-bottom: 15px;
      color: #3a2a1a;
    }

    .content p {
      font-size: 18px;
      line-height: 1.7;
      margin-bottom: 25px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 30px;
    }

    .tag {
      background: #fff1bd;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: bold;
      color: #6b4200;
    }

    .info-box {
      background: #fff8ec;
      border-left: 6px solid #ffb347;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 25px;
    }

    button {
      border: none;
      background: #ff914d;
      color: white;
      padding: 15px 24px;
      font-size: 17px;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #ff7a26;
      transform: translateY(-2px);
    }

    #message {
      margin-top: 18px;
      font-size: 18px;
      font-weight: bold;
      color: #d66b00;
    }

    @media (max-width: 760px) {
      .card {
        grid-template-columns: 1fr;
      }

      .content h1 {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="image-box">
      <div class="dog-face">
        <div class="ear left"></div>
        <div class="ear right"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="nose"></div>
        <div class="mouth">ω</div>
      </div>
      <h2>나는 뽀식이!</h2>
    </div>

    <div class="content">
      <h1>뽀식이를 소개합니다 🐶</h1>
      <p>
        뽀식이는 9살 푸들믹스 강아지입니다. 겁은 조금 많지만,
        마음은 착하고 귀여운 매력을 가진 가족 같은 친구예요.
      </p>

      <div class="tag-list">
        <span class="tag">푸들믹스</span>
        <span class="tag">9살 노견</span>
        <span class="tag">천방지축</span>
        <span class="tag">말썽쟁이</span>
        <span class="tag">도도함</span>
      </div>

      <div class="info-box">
        <p>
          평소에는 말썽도 부리고 집사에게 살짝 신경질도 내지만,
          사실은 사랑받고 싶은 애교쟁이입니다.
        </p>
      </div>

      <button onclick="showMessage()">뽀식이 한마디 듣기</button>
      <div id="message"></div>
    </div>
  </div>

  <script>
    function showMessage() {
      const messages = [
        "나 건드리지 마... 근데 간식은 줘.",
        "집사야, 오늘도 내가 귀여운 건 인정하지?",
        "산책은 좋은데 목욕은 싫어!",
        "나는 9살이지만 아직 현역 말썽쟁이야."
      ];

      const randomIndex = Math.floor(Math.random() * messages.length);
      document.getElementById("message").textContent = messages[randomIndex];
    }
  </script>
</body>
</html>
